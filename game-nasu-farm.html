<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ツーブロック茄子農園 v0.2｜ウォルト・ミハニー・ランド</title>
  <style>
    :root {
      --ink: #2b2118;
      --paper: rgba(255, 255, 255, 0.82);
      --line: rgba(43, 33, 24, 0.14);
      --yellow: #ffcc4d;
      --green: #c9f7c1;
      --blue: #bdefff;
      --pink: #ffb7c8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at 18% 10%, rgba(255,255,255,0.92), transparent 28%),
        radial-gradient(circle at 84% 22%, rgba(201,247,193,0.72), transparent 26%),
        linear-gradient(135deg, #fff3c4, #ffd6e0, #d7f4ff);
      color: var(--ink);
      min-height: 100vh;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 18px 56px;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      background: var(--ink);
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
    }

    .hero {
      background: var(--paper);
      border: 3px solid var(--line);
      border-radius: 34px;
      padding: 44px 22px;
      text-align: center;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.09);
    }

    h1 {
      font-size: clamp(36px, 7vw, 68px);
      margin: 0 0 16px;
      letter-spacing: 0.04em;
    }

    .copy {
      font-size: clamp(18px, 3vw, 25px);
      line-height: 1.7;
      font-weight: 800;
      margin: 0;
    }

    .farm {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(260px, 0.9fr);
      gap: 18px;
      margin-top: 34px;
    }

    .panel {
      background: var(--paper);
      border: 3px solid var(--line);
      border-radius: 28px;
      padding: 24px;
      line-height: 1.8;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 26px;
    }

    .money {
      display: block;
      margin: 10px 0 8px;
      font-size: clamp(38px, 8vw, 68px);
      line-height: 1;
      font-weight: 900;
    }

    .unit {
      font-size: 20px;
      font-weight: 900;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .stat {
      background: rgba(255,255,255,0.72);
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 14px;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.3;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .button {
      border: 0;
      background: var(--ink);
      color: white;
      padding: 14px 16px;
      border-radius: 14px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      opacity: 0.9;
      text-align: center;
    }

    .button:hover {
      opacity: 1;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .button.secondary {
      background: var(--yellow);
      color: var(--ink);
    }

    .button.danger {
      background: rgba(255, 183, 200, 0.92);
      color: var(--ink);
    }

    .field {
      min-height: 260px;
      display: grid;
      place-items: center;
      text-align: center;
      background:
        linear-gradient(rgba(255,255,255,0.48), rgba(255,255,255,0.48)),
        repeating-linear-gradient(90deg, rgba(201,247,193,0.8) 0 34px, rgba(189,239,255,0.5) 34px 68px);
      border: 3px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .field-scene {
      width: min(100%, 340px);
      padding: 20px;
    }

    .field-stage {
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .field-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }

    .crop {
      display: inline-grid;
      place-items: center;
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.64);
      border: 2px solid var(--line);
      border-radius: 16px;
      font-size: 26px;
      box-shadow: 0 8px 16px rgba(43, 33, 24, 0.08);
    }

    .sign {
      display: inline-block;
      background: var(--yellow);
      border: 2px solid rgba(43, 33, 24, 0.2);
      border-radius: 14px;
      padding: 8px 12px;
      font-weight: 900;
      box-shadow: 0 8px 16px rgba(43, 33, 24, 0.1);
    }

    .visitors {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .visitor {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.74);
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 900;
      box-shadow: 0 8px 16px rgba(43, 33, 24, 0.08);
    }

    .nasu {
      font-size: 86px;
      filter: drop-shadow(0 12px 18px rgba(43, 33, 24, 0.18));
    }

    .field-note {
      margin: 8px 0 0;
      font-weight: 900;
    }

    .field-status {
      margin: 8px 0 0;
      line-height: 1.7;
      font-weight: 800;
    }

    .message {
      min-height: 28px;
      margin: 14px 0 0;
      font-weight: 800;
    }

    .footer {
      text-align: center;
      margin-top: 42px;
      opacity: 0.72;
      font-weight: 800;
    }

    @media (max-width: 760px) {
      .farm {
        grid-template-columns: 1fr;
      }

      .hero {
        padding: 40px 18px;
        border-radius: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <a class="back" href="./arcade.html">← Nasu Arcadeへ戻る</a>

    <section class="hero">
      <h1>ツーブロック茄子農園 v0.2</h1>
      <p class="copy">
        ナスを収穫して、畑を強化する。<br />
        小さな農園の最初の一歩。
      </p>
    </section>

    <section class="farm">
      <div class="panel">
        <h2>農園の財布</h2>
        <span class="money" id="money">0</span>
        <span class="unit">ナス円</span>

        <div class="stats">
          <div class="stat">
            収穫額
            <strong><span id="harvestAmount">10</span> ナス円</strong>
          </div>
          <div class="stat">
            強化費用
            <strong><span id="upgradeCost">100</span> ナス円</strong>
          </div>
          <div class="stat">
            畑レベル
            <strong>Lv.<span id="level">1</span></strong>
          </div>
        </div>

        <div class="actions">
          <button class="button" id="harvestButton" type="button">ナスを収穫する</button>
          <button class="button secondary" id="upgradeButton" type="button">畑をアップグレード</button>
          <button class="button danger" id="resetButton" type="button">リセット</button>
        </div>

        <p class="message" id="message">農園、開園ナス。</p>
      </div>

      <div class="field" aria-label="ツーブロック茄子農園">
        <div class="field-scene">
          <div class="nasu">🍆</div>
          <div class="field-stage" id="fieldStage"></div>
          <p class="field-note" id="fieldName">小さな畑</p>
          <p class="field-status" id="fieldStatus">畑はまだ小さい。ここから育てるナス。</p>
        </div>
      </div>
    </section>

    <p class="footer">ツーブロック茄子農園 / v0.2</p>
  </main>

  <script>
    const STORAGE_KEY = "mihanyNasuFarmV01";
    const initialState = {
      money: 0,
      harvestAmount: 10,
      upgradeCost: 100,
      level: 1
    };

    let state = loadState();

    const moneyEl = document.getElementById("money");
    const harvestAmountEl = document.getElementById("harvestAmount");
    const upgradeCostEl = document.getElementById("upgradeCost");
    const levelEl = document.getElementById("level");
    const messageEl = document.getElementById("message");
    const fieldStageEl = document.getElementById("fieldStage");
    const fieldNameEl = document.getElementById("fieldName");
    const fieldStatusEl = document.getElementById("fieldStatus");
    const harvestButton = document.getElementById("harvestButton");
    const upgradeButton = document.getElementById("upgradeButton");
    const resetButton = document.getElementById("resetButton");

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);

      if (!saved) {
        return { ...initialState };
      }

      try {
        return { ...initialState, ...JSON.parse(saved) };
      } catch {
        return { ...initialState };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function formatNumber(value) {
      return Math.floor(value).toLocaleString("ja-JP");
    }

    function getFieldView(level) {
      if (level >= 10) {
        return {
          name: "いきりトマト視察農園",
          status: "いきりトマトが視察に来た。農園、ちょっと注目されているナス。",
          rows: ["🍆🍆🍆🍆", "🥕🍆🍆🍅"],
          sign: "視察対応中",
          visitors: ["ロン毛大根", "いきりトマト"]
        };
      }

      if (level >= 5) {
        return {
          name: "ロン毛大根お手伝い畑",
          status: "ロン毛大根が手伝いに来た。収穫現場に謎の安心感があるナス。",
          rows: ["🍆🍆🍆", "🥕🍆🍆"],
          sign: "ツーブロック茄子農園",
          visitors: ["ロン毛大根"]
        };
      }

      if (level >= 3) {
        return {
          name: "看板つきの畑",
          status: "看板が立った。ここが農園だと胸を張れるナス。",
          rows: ["🍆🍆🍆", "🍆🍆"],
          sign: "ツーブロック茄子農園",
          visitors: []
        };
      }

      return {
        name: "小さな畑",
        status: "畑はまだ小さい。ここから育てるナス。",
        rows: ["🍆🍆", "🍆"],
        sign: "",
        visitors: []
      };
    }

    function renderField() {
      const view = getFieldView(state.level);
      const rows = view.rows.map((row) => {
        const crops = [...row].map((crop) => `<span class="crop">${crop}</span>`).join("");
        return `<div class="field-row">${crops}</div>`;
      });
      const sign = view.sign ? [`<div class="sign">${view.sign}</div>`] : [];
      const visitors = view.visitors.length
        ? [`<div class="visitors">${view.visitors.map((visitor) => `<span class="visitor">${visitor}</span>`).join("")}</div>`]
        : [];

      fieldStageEl.innerHTML = [...sign, ...rows, ...visitors].join("");
      fieldNameEl.textContent = view.name;
      fieldStatusEl.textContent = view.status;
    }

    function render() {
      moneyEl.textContent = formatNumber(state.money);
      harvestAmountEl.textContent = formatNumber(state.harvestAmount);
      upgradeCostEl.textContent = formatNumber(state.upgradeCost);
      levelEl.textContent = formatNumber(state.level);
      upgradeButton.disabled = state.money < state.upgradeCost;
      renderField();
    }

    harvestButton.addEventListener("click", () => {
      state.money += state.harvestAmount;
      messageEl.textContent = `${formatNumber(state.harvestAmount)}ナス円を収穫したナス。`;
      saveState();
      render();
    });

    upgradeButton.addEventListener("click", () => {
      if (state.money < state.upgradeCost) {
        messageEl.textContent = "まだナス円が足りないナス。";
        return;
      }

      state.money -= state.upgradeCost;
      state.harvestAmount += 5;
      state.upgradeCost = Math.ceil(state.upgradeCost * 1.5);
      state.level += 1;
      messageEl.textContent = "畑をアップグレードしたナス。";
      saveState();
      render();
    });

    resetButton.addEventListener("click", () => {
      state = { ...initialState };
      saveState();
      messageEl.textContent = "農園をリセットしたナス。";
      render();
    });

    render();
  </script>
</body>
</html>
