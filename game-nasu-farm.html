<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ツーブロック茄子農園 v6｜ウォルト・ミハニー・ランド</title>
  <style>
    :root {
      --ink: #2b2118;
      --paper: rgba(255, 255, 255, 0.82);
      --line: rgba(43, 33, 24, 0.14);
      --yellow: #ffcc4d;
      --green: #c9f7c1;
      --blue: #bdefff;
      --pink: #ffb7c8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at 18% 10%, rgba(255,255,255,0.92), transparent 28%),
        radial-gradient(circle at 84% 22%, rgba(201,247,193,0.72), transparent 26%),
        linear-gradient(135deg, #fff3c4, #ffd6e0, #d7f4ff);
      color: var(--ink);
      min-height: 100vh;
    }

    /* Layout */
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 18px 48px;
    }

    .back {
      display: inline-block;
      margin-bottom: 14px;
      background: var(--ink);
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
    }

    .hero {
      background: var(--paper);
      border: 3px solid var(--line);
      border-radius: 28px;
      padding: 12px 14px;
      text-align: left;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.09);
    }

    h1 {
      display: inline-block;
      font-size: clamp(18px, 4.5vw, 28px);
      margin: 0;
      letter-spacing: 0.02em;
      background: rgba(255, 204, 77, 0.42);
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 8px 16px;
    }

    .copy {
      font-size: clamp(15px, 2.6vw, 20px);
      line-height: 1.5;
      font-weight: 800;
      margin: 0;
    }

    /* Control panel */
    .farm {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 18px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .top-bar .back {
      margin: 0;
    }

    .mini-money {
      background: rgba(255, 255, 255, 0.82);
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(43, 33, 24, 0.08);
      white-space: nowrap;
    }

    .panel {
      background: var(--paper);
      border: 3px solid var(--line);
      border-radius: 28px;
      padding: 24px;
      line-height: 1.8;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
    }

    .control-panel {
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      order: 2;
    }

    .tab-nav {
      order: 3;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.56);
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 6px;
      box-shadow: 0 14px 30px rgba(43, 33, 24, 0.08);
    }

    .tab-button {
      min-height: 48px;
      border: 0;
      border-radius: 15px;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
    }

    .tab-button.is-active {
      background: var(--ink);
      color: white;
      box-shadow: 0 10px 18px rgba(43, 33, 24, 0.16);
    }

    .tab-panel {
      order: 2;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }

    .tab-panel[hidden] {
      display: none;
    }

    .panel h2 {
      margin: 0;
      font-size: 26px;
    }

    .wallet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .version-pill {
      flex: 0 0 auto;
      background: var(--green);
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 900;
    }

    .money-box {
      margin-top: 14px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .money {
      font-size: clamp(38px, 8vw, 68px);
      line-height: 1;
      font-weight: 900;
    }

    .unit {
      font-size: 20px;
      font-weight: 900;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .stat {
      background: rgba(255,255,255,0.72);
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      box-shadow: inset 0 -8px 18px rgba(255, 204, 77, 0.12);
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.3;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .action-secondary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .button {
      border: 0;
      background: var(--ink);
      color: white;
      padding: 14px 16px;
      border-radius: 14px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      opacity: 0.9;
      text-align: center;
      min-height: 52px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    .button:hover {
      opacity: 1;
    }

    .button:active,
    .button.is-pressed {
      transform: scale(0.96);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .button.secondary {
      background: var(--yellow);
      color: var(--ink);
    }

    .button.day {
      background: var(--blue);
      color: var(--ink);
    }

    .button.primary {
      min-height: 72px;
      font-size: 22px;
      border-radius: 20px;
      box-shadow: 0 14px 24px rgba(43, 33, 24, 0.14);
    }

    .button.danger {
      background: rgba(255, 183, 200, 0.92);
      color: var(--ink);
    }

    .upgrade-card,
    .future-slot {
      margin-top: 14px;
      background: rgba(255, 255, 255, 0.72);
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      font-weight: 800;
    }

    .future-slot {
      opacity: 0.78;
    }

    .future-slot:empty {
      display: none;
    }

    /* Farm visual */
    .field {
      position: relative;
      order: 1;
      min-height: 430px;
      display: grid;
      place-items: stretch;
      text-align: center;
      background:
        radial-gradient(circle at 16% 14%, rgba(255, 255, 255, 0.82), transparent 24%),
        linear-gradient(180deg, rgba(189, 239, 255, 0.74) 0 38%, rgba(201, 247, 193, 0.78) 38% 100%);
      border: 4px solid rgba(43, 33, 24, 0.16);
      border-radius: 32px;
      box-shadow: 0 24px 60px rgba(43, 33, 24, 0.14);
      overflow: hidden;
      isolation: isolate;
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
      transition: box-shadow 180ms ease, transform 180ms ease;
    }

    .field::before {
      content: "";
      position: absolute;
      inset: auto -8% 0;
      height: 46%;
      background:
        repeating-linear-gradient(0deg, rgba(111, 74, 42, 0.22) 0 3px, transparent 3px 18px),
        linear-gradient(180deg, #a6764e, #7a4b2c);
      border-radius: 50% 50% 0 0 / 18% 18% 0 0;
      z-index: -1;
    }

    .field.is-upgraded {
      animation: fieldGlow 520ms ease;
    }

    .field-scene {
      position: relative;
      display: grid;
      align-content: center;
      gap: 12px;
      width: min(100%, 700px);
      min-height: 430px;
      padding: 28px 22px 24px;
      margin: 0 auto;
    }

    .day-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 3;
      background: rgba(255, 255, 255, 0.88);
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 900;
      box-shadow: 0 10px 20px rgba(43, 33, 24, 0.1);
    }

    .tap-nasu {
      position: relative;
      z-index: 2;
      display: inline-grid;
      justify-items: center;
      gap: 3px;
      width: 118px;
      min-height: 116px;
      margin: 18px auto 0;
      border: 0;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.58);
      color: var(--ink);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 16px 28px rgba(43, 33, 24, 0.12);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .tap-nasu:active,
    .tap-nasu.is-pressed {
      transform: scale(0.94) rotate(-2deg);
    }

    .tap-hint {
      font-size: 13px;
    }

    .field-stage {
      position: relative;
      min-height: 230px;
      display: grid;
      align-content: end;
      justify-items: center;
      gap: 10px;
      padding: 14px 12px 8px;
    }

    .farm-sky {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .sun {
      position: absolute;
      top: 8px;
      right: 22px;
      width: 44px;
      height: 44px;
      background: var(--yellow);
      border-radius: 50%;
      box-shadow: 0 0 0 10px rgba(255, 204, 77, 0.2);
    }

    .cloud {
      position: absolute;
      top: 22px;
      left: 22px;
      width: 74px;
      height: 24px;
      background: rgba(255, 255, 255, 0.76);
      border-radius: 999px;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      bottom: 7px;
      background: rgba(255, 255, 255, 0.76);
      border-radius: 50%;
    }

    .cloud::before {
      left: 12px;
      width: 28px;
      height: 28px;
    }

    .cloud::after {
      right: 12px;
      width: 22px;
      height: 22px;
    }

    .farm-plot {
      width: min(100%, 520px);
      min-height: 146px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 14px;
      background:
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.12) 0 2px, transparent 2px 22px),
        linear-gradient(180deg, #8c5a35, #5d351f);
      border: 3px solid rgba(43, 33, 24, 0.22);
      border-radius: 22px;
      box-shadow: inset 0 -18px 24px rgba(43, 33, 24, 0.22), 0 14px 26px rgba(43, 33, 24, 0.14);
    }

    .crop {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 52px;
      font-size: 34px;
    }

    .crop::before {
      content: "";
      position: absolute;
      bottom: 2px;
      width: 34px;
      height: 10px;
      background: rgba(43, 33, 24, 0.2);
      border-radius: 50%;
      z-index: -1;
    }

    .tier-seed .crop {
      font-size: 24px;
      opacity: 0.86;
    }

    .tier-fancy .farm-plot {
      grid-template-columns: repeat(4, 1fr);
      min-height: 192px;
    }

    .tier-green .farm-plot,
    .tier-fancy .farm-plot {
      background:
        repeating-linear-gradient(90deg, rgba(201, 247, 193, 0.2) 0 14px, transparent 14px 28px),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.12) 0 2px, transparent 2px 22px),
        linear-gradient(180deg, #946036, #5d351f);
    }

    .tier-fancy .farm-plot {
      border-color: rgba(255, 204, 77, 0.62);
      box-shadow: inset 0 -18px 24px rgba(43, 33, 24, 0.2), 0 0 0 8px rgba(255, 204, 77, 0.18), 0 18px 32px rgba(43, 33, 24, 0.16);
    }

    .sign {
      display: inline-block;
      background: var(--yellow);
      border: 2px solid rgba(43, 33, 24, 0.2);
      border-radius: 14px;
      padding: 8px 12px;
      font-weight: 900;
      box-shadow: 0 8px 16px rgba(43, 33, 24, 0.1);
      transform: rotate(-1.5deg);
    }

    .visitors {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .visitor {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.74);
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 900;
      box-shadow: 0 8px 16px rgba(43, 33, 24, 0.08);
    }

    .float-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }

    /* Effects */
    .float-gain {
      position: absolute;
      left: 50%;
      bottom: 42%;
      transform: translateX(-50%);
      color: var(--ink);
      background: rgba(255, 204, 77, 0.94);
      border: 2px solid rgba(43, 33, 24, 0.18);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(43, 33, 24, 0.12);
      animation: floatGain 820ms ease-out forwards;
    }

    .nasu {
      font-size: 92px;
      filter: drop-shadow(0 12px 18px rgba(43, 33, 24, 0.18));
    }

    .field-note {
      margin: 8px 0 0;
      font-weight: 900;
    }

    /* Comments */
    .field-status {
      position: relative;
      margin: 8px auto 0;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.82);
      border: 2px solid var(--line);
      border-radius: 18px;
      padding: 10px 14px;
      line-height: 1.7;
      font-weight: 800;
    }

    .field-status::before {
      content: "";
      position: absolute;
      top: -9px;
      left: 50%;
      width: 16px;
      height: 16px;
      background: rgba(255, 255, 255, 0.82);
      border-left: 2px solid var(--line);
      border-top: 2px solid var(--line);
      transform: translateX(-50%) rotate(45deg);
    }

    .message {
      position: relative;
      min-height: 28px;
      margin: 14px 0 0;
      background: rgba(255, 255, 255, 0.74);
      border: 2px solid var(--line);
      border-radius: 18px;
      padding: 10px 14px;
      font-weight: 800;
    }

    .message::before {
      content: "🍆";
      margin-right: 6px;
    }

    .event-log {
      margin-top: 12px;
      background: rgba(255, 255, 255, 0.76);
      border: 2px solid var(--line);
      border-radius: 18px;
      padding: 12px 14px;
      box-shadow: inset 0 -8px 18px rgba(189, 239, 255, 0.18);
    }

    .event-label {
      display: inline-block;
      background: var(--blue);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .event-title {
      font-weight: 900;
      margin: 0 0 4px;
    }

    .event-message {
      margin: 0;
      line-height: 1.65;
      font-weight: 800;
    }

    @keyframes floatGain {
      0% {
        opacity: 0;
        transform: translate(-50%, 12px) scale(0.92);
      }
      18% {
        opacity: 1;
        transform: translate(-50%, 0) scale(1.05);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -58px) scale(1);
      }
    }

    @keyframes fieldGlow {
      0% {
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
        transform: scale(1);
      }
      42% {
        box-shadow: 0 0 0 8px rgba(255, 204, 77, 0.28), 0 22px 56px rgba(255, 204, 77, 0.34);
        transform: scale(1.012);
      }
      100% {
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
        transform: scale(1);
      }
    }

    .footer {
      text-align: center;
      margin-top: 42px;
      opacity: 0.72;
      font-weight: 800;
    }

    /* Mobile */
    @media (max-width: 760px) {
      .container {
        padding: 20px 12px 34px;
      }

      .back {
        margin-bottom: 12px;
        padding: 9px 12px;
        font-size: 14px;
      }

      .top-bar {
        margin-bottom: 10px;
      }

      .mini-money {
        padding: 8px 10px;
        font-size: 14px;
      }

      .hero {
        padding: 10px 12px;
        border-radius: 24px;
      }

      .farm {
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 16px;
      }

      .panel {
        padding: 16px;
        border-radius: 24px;
      }

      .panel h2 {
        font-size: 21px;
      }

      .money-box {
        margin-top: 10px;
      }

      .money {
        font-size: clamp(42px, 14vw, 56px);
      }

      .unit {
        font-size: 17px;
      }

      .stats {
        gap: 8px;
        margin-top: 14px;
      }

      .stat {
        border-radius: 16px;
        padding: 10px;
        line-height: 1.45;
      }

      .stat strong {
        font-size: 18px;
      }

      .actions {
        gap: 10px;
        margin-top: 14px;
      }

      .button {
        min-height: 50px;
        padding: 12px 10px;
        border-radius: 14px;
      }

      .button.primary {
        min-height: 76px;
        font-size: 21px;
      }

      .tab-nav {
        position: sticky;
        bottom: 10px;
        z-index: 5;
      }

      .field {
        min-height: 390px;
        border-radius: 24px;
      }

      .field-scene {
        min-height: 390px;
        padding: 14px;
      }

      .day-badge {
        top: 10px;
        right: 10px;
        padding: 7px 10px;
        font-size: 13px;
      }

      .nasu {
        font-size: 70px;
      }

      .tap-nasu {
        width: 108px;
        min-height: 108px;
        margin-top: 10px;
      }

      .field-stage {
        gap: 8px;
        min-height: 176px;
      }

      .farm-plot {
        min-height: 122px;
        gap: 5px;
        padding: 10px;
        border-radius: 18px;
      }

      .tier-fancy .farm-plot {
        min-height: 162px;
      }

      .crop {
        min-height: 42px;
        font-size: 25px;
      }

      .crop::before {
        width: 26px;
        height: 8px;
      }

      .field-note,
      .field-status,
      .message {
        font-size: 14px;
      }

      .message {
        margin-top: 10px;
        min-height: 22px;
        padding: 9px 12px;
      }

      .footer {
        margin-top: 26px;
      }
    }

    @media (max-width: 380px) {
      h1 {
        font-size: 25px;
        padding: 7px 12px;
      }

      .copy {
        font-size: 15px;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="top-bar">
      <a class="back" href="./arcade.html">← Nasu Arcade</a>
      <div class="mini-money"><span id="money">0</span> ナス円</div>
    </div>

    <section class="farm">
      <nav class="tab-nav" aria-label="農園メニュー">
        <button class="tab-button is-active" type="button" data-tab="farm">農園</button>
        <button class="tab-button" type="button" data-tab="wallet">財布</button>
        <button class="tab-button" type="button" data-tab="upgrade">強化</button>
      </nav>

      <section class="tab-panel" id="farmPanel" data-panel="farm">
        <div class="field" aria-label="ツーブロック茄子農園">
          <div class="field-scene">
            <div class="day-badge"><span id="day">1</span>日目</div>
            <button class="tap-nasu" id="harvestButton" type="button" aria-label="ナスを収穫する">
              <span class="nasu">🍆</span>
              <span class="tap-hint">タップで収穫</span>
            </button>
            <div class="field-stage" id="fieldStage"></div>
            <p class="field-note" id="fieldName">小さな畑</p>
            <p class="field-status" id="fieldStatus">畑はまだ小さい。ここから育てるナス。</p>
            <div class="float-layer" id="floatLayer" aria-hidden="true"></div>
          </div>
        </div>

        <p class="message" id="message">農園、開園ナス。</p>
        <div class="actions">
          <button class="button day" id="endDayButton" type="button">1日を終える</button>
        </div>
        <section class="event-log" aria-label="今日の出来事">
          <span class="event-label">今日の出来事</span>
          <p class="event-title" id="eventName">まだ記録なし</p>
          <p class="event-message" id="eventMessage">1日を終えると、ここに農園の出来事が記録されるナス。</p>
        </section>
      </section>

      <section class="panel tab-panel" id="walletPanel" data-panel="wallet" hidden>
        <div class="wallet-head">
          <h2>農園の財布</h2>
          <span class="version-pill">v6</span>
        </div>

        <div class="money-box">
          <span class="money" id="walletMoney">0</span>
          <span class="unit">ナス円</span>
        </div>

        <div class="stats">
          <div class="stat">
            収穫額
            <strong><span id="harvestAmount">10</span> ナス円</strong>
          </div>
          <div class="stat">
            自動収益
            <strong><span id="autoIncome">0</span> ナス円/秒</strong>
          </div>
          <div class="stat">
            強化費用
            <strong><span id="upgradeCost">100</span> ナス円</strong>
          </div>
          <div class="stat">
            畑レベル
            <strong>Lv.<span id="level">1</span></strong>
          </div>
        </div>

        <div class="future-slot" aria-hidden="true"></div>
      </section>

      <section class="panel tab-panel" id="upgradePanel" data-panel="upgrade" hidden>
        <div class="wallet-head">
          <h2>畑の強化</h2>
          <span class="version-pill">Lv.<span id="upgradeLevel">1</span></span>
        </div>

        <div class="upgrade-card">
          <strong>畑をアップグレード</strong><br />
          必要ナス円：<span id="upgradeCost">100</span><br />
          強化後：1タップ収穫額 +5 ナス円
        </div>

        <div class="actions">
          <button class="button secondary" id="upgradeButton" type="button">畑をアップグレード</button>
          <button class="button danger" id="resetButton" type="button">リセット</button>
        </div>

        <div class="future-slot" aria-hidden="true"></div>
      </section>
    </section>

    <p class="footer">ツーブロック茄子農園 / mobile ui</p>
  </main>

  <script>
    // 設定
    const CONFIG = {
      storageKey: "mihanyNasuFarmV01",
      economy: {
        initialMoney: 0,
        initialHarvestAmount: 10,
        initialUpgradeCost: 100,
        harvestIncreasePerUpgrade: 5,
        upgradeCostMultiplier: 1.5,
        autoIncomePerSecond: 0,
        autoIncomeMultiplier: 1
      },
      progression: {
        initialLevel: 1,
        fieldStages: [
          {
            minLevel: 10,
            tier: "fancy",
            name: "豪華な視察農園",
            comment: "いきりトマトが視察に来たナス。ちょっと腹立つナス。",
            crops: ["🌱", "🍆", "🌿", "🍆", "🥕", "🍆", "🍅", "🍆", "🌿", "🍆", "🌱", "🍆"],
            sign: "視察対応中",
            visitors: ["🥕 ロン毛大根", "🍅 いきりトマト"]
          },
          {
            minLevel: 5,
            tier: "green",
            name: "ロン毛大根お手伝い畑",
            comment: "ロン毛大根が手伝いに来たナス。風が吹いてるナス。",
            crops: ["🌱", "🍆", "🌿", "🍆", "🥕", "🍆", "🌱", "🍆"],
            sign: "ツーブロック茄子農園",
            visitors: ["🥕 ロン毛大根"]
          },
          {
            minLevel: 3,
            tier: "sign",
            name: "看板つきの畑",
            comment: "看板が立ったナス。急に施設感が出たナス。",
            crops: ["🌱", "🍆", "🌱", "🍆", "🌱", "🍆", "🌱", "🍆"],
            sign: "ツーブロック茄子農園",
            visitors: []
          },
          {
            minLevel: 1,
            tier: "seed",
            name: "小さな土の畑",
            comment: "まだ土しかないナス。でも国はここからナス。",
            crops: ["•", "🌱", "•", "🌱", "•", "•", "🌱", "•"],
            sign: "",
            visitors: []
          }
        ]
      },
      dayCycle: {
        initialDay: 1,
        dailyBonusSeconds: 10,
        reports: [
          "今日もナスは静かに育ったナス。",
          "畑に少しだけ生活感が出てきたナス。",
          "ロン毛大根が遠くを見ていたナス。"
        ]
      },
      events: {
        chance: 0.4,
        noneName: "出来事なし",
        noneMessage: "今日は大きな出来事はなかったナス。静かな農園日和ナス。",
        list: [
          {
            id: "tomato_inspection",
            name: "いきりトマトの視察",
            message: "いきりトマトが視察に来たナス。腕組みだけして帰ったナス。",
            bonusMultiplier: 0.8
          },
          {
            id: "small_typhoon",
            name: "小さな台風",
            message: "小さな台風が来たナス。畑の看板が少し傾いたナス。",
            bonusMultiplier: 0.7
          },
          {
            id: "eggplant_price_drop",
            name: "ナス価格下落",
            message: "ナス価格が少し下がったナス。世知辛いナス。",
            bonusMultiplier: 0.85
          },
          {
            id: "radish_advice",
            name: "ロン毛大根の助言",
            message: "ロン毛大根が『風を読め』と言ったナス。よく分からないけど少し助かったナス。",
            bonusMultiplier: 1.2
          },
          {
            id: "quiet_day",
            name: "静かな一日",
            message: "今日は何も起きなかったナス。でもこういう日が一番大事ナス。",
            bonusMultiplier: 1
          }
        ]
      },
      timing: {
        autoIncomeIntervalMs: 1000,
        harvestPressMs: 150,
        harvestFloatMs: 820,
        upgradeGlowMs: 520
      }
    };

    // 状態
    const initialState = {
      money: CONFIG.economy.initialMoney,
      harvestAmount: CONFIG.economy.initialHarvestAmount,
      upgradeCost: CONFIG.economy.initialUpgradeCost,
      level: CONFIG.progression.initialLevel,
      day: CONFIG.dayCycle.initialDay,
      lastDailyReport: "",
      lastEventName: "",
      lastEventMessage: ""
    };

    // DOM
    const elements = {
      money: document.getElementById("money"),
      walletMoney: document.getElementById("walletMoney"),
      harvestAmount: document.getElementById("harvestAmount"),
      autoIncome: document.getElementById("autoIncome"),
      upgradeCost: document.getElementById("upgradeCost"),
      level: document.getElementById("level"),
      upgradeLevel: document.getElementById("upgradeLevel"),
      day: document.getElementById("day"),
      message: document.getElementById("message"),
      eventName: document.getElementById("eventName"),
      eventMessage: document.getElementById("eventMessage"),
      field: document.querySelector(".field"),
      floatLayer: document.getElementById("floatLayer"),
      fieldStage: document.getElementById("fieldStage"),
      fieldName: document.getElementById("fieldName"),
      fieldStatus: document.getElementById("fieldStatus"),
      harvestButton: document.getElementById("harvestButton"),
      endDayButton: document.getElementById("endDayButton"),
      upgradeButton: document.getElementById("upgradeButton"),
      resetButton: document.getElementById("resetButton"),
      tabButtons: document.querySelectorAll(".tab-button"),
      tabPanels: document.querySelectorAll(".tab-panel")
    };

    let state = loadGame();
    let autoIncomeTimerId = null;

    // 保存
    function loadGame() {
      const saved = localStorage.getItem(CONFIG.storageKey);

      if (!saved) {
        return { ...initialState };
      }

      try {
        return { ...initialState, ...JSON.parse(saved) };
      } catch {
        return { ...initialState };
      }
    }

    function saveGame() {
      localStorage.setItem(CONFIG.storageKey, JSON.stringify(state));
    }

    function formatNumber(value) {
      return Math.floor(value).toLocaleString("ja-JP");
    }

    function getFieldView(level) {
      return CONFIG.progression.fieldStages.find((stage) => level >= stage.minLevel);
    }

    // 描画
    function renderField() {
      const view = getFieldView(state.level);
      const crops = view.crops.map((crop) => `<span class="crop">${crop}</span>`).join("");
      const sky = '<div class="farm-sky"><span class="cloud"></span><span class="sun"></span></div>';
      const plot = `<div class="farm-plot">${crops}</div>`;
      const sign = view.sign ? [`<div class="sign">${view.sign}</div>`] : [];
      const visitors = view.visitors.length
        ? [`<div class="visitors">${view.visitors.map((visitor) => `<span class="visitor">${visitor}</span>`).join("")}</div>`]
        : [];

      elements.fieldStage.className = `field-stage tier-${view.tier}`;
      elements.fieldStage.innerHTML = [sky, ...sign, plot, ...visitors].join("");
      elements.fieldName.textContent = view.name;
      elements.fieldStatus.textContent = view.comment;
    }

    function renderMessage() {
      const view = getFieldView(state.level);
      elements.message.textContent = state.lastDailyReport || view.comment;
    }

    function renderEventLog() {
      elements.eventName.textContent = state.lastEventName || "まだ記録なし";
      elements.eventMessage.textContent = state.lastEventMessage || "1日を終えると、ここに農園の出来事が記録されるナス。";
    }

    function render() {
      elements.money.textContent = formatNumber(state.money);
      elements.walletMoney.textContent = formatNumber(state.money);
      elements.harvestAmount.textContent = formatNumber(state.harvestAmount);
      elements.autoIncome.textContent = formatNumber(getAutoIncomePerSecond());
      elements.upgradeCost.textContent = formatNumber(state.upgradeCost);
      elements.level.textContent = formatNumber(state.level);
      elements.upgradeLevel.textContent = formatNumber(state.level);
      elements.day.textContent = formatNumber(state.day);
      elements.upgradeButton.disabled = state.money < state.upgradeCost;
      renderField();
      renderMessage();
      renderEventLog();
    }

    // ゲーム処理
    function harvestNasu() {
      state.money += state.harvestAmount;
      triggerHarvestEffect(state.harvestAmount);
      saveGame();
      render();
    }

    function upgradeField() {
      if (state.money < state.upgradeCost) {
        elements.message.textContent = "まだナス円が足りないナス。";
        return;
      }

      state.money -= state.upgradeCost;
      state.harvestAmount += CONFIG.economy.harvestIncreasePerUpgrade;
      state.upgradeCost = Math.ceil(state.upgradeCost * CONFIG.economy.upgradeCostMultiplier);
      state.level += 1;
      triggerUpgradeEffect();
      saveGame();
      render();
    }

    function resetGame() {
      state = { ...initialState };
      saveGame();
      render();
    }

    function handleEndDay() {
      const completedDay = state.day;
      const baseBonus = getEndDayBonusIncome();
      const dailyEvent = selectDailyEvent();
      const eventResult = applyDailyEvent(baseBonus, dailyEvent);
      state.day += 1;
      state.money += eventResult.bonus;
      state.lastDailyReport = buildDailyReport(completedDay, eventResult.bonus);
      state.lastEventName = eventResult.name;
      state.lastEventMessage = eventResult.message;
      saveGame();
      render();
    }

    // 自動収益
    function getAutoIncomePerSecond() {
      return CONFIG.economy.autoIncomePerSecond * CONFIG.economy.autoIncomeMultiplier;
    }

    function getEndDayBonusIncome() {
      return Math.floor(getAutoIncomePerSecond() * CONFIG.dayCycle.dailyBonusSeconds);
    }

    function buildDailyReport(day, bonus) {
      const reportIndex = (day - CONFIG.dayCycle.initialDay) % CONFIG.dayCycle.reports.length;
      const report = CONFIG.dayCycle.reports[Math.max(0, reportIndex)];

      if (bonus <= 0) {
        return `${day}日目の日報：${report}`;
      }

      return `${day}日目の日報：${report} 日次ボーナス +${formatNumber(bonus)}ナス円。`;
    }

    function selectDailyEvent() {
      if (Math.random() > CONFIG.events.chance) {
        return null;
      }

      const index = Math.floor(Math.random() * CONFIG.events.list.length);
      return CONFIG.events.list[index];
    }

    function applyDailyEvent(baseBonus, event) {
      if (!event) {
        return {
          name: CONFIG.events.noneName,
          message: CONFIG.events.noneMessage,
          bonus: baseBonus
        };
      }

      return {
        name: event.name,
        message: event.message,
        bonus: Math.max(0, Math.floor(baseBonus * event.bonusMultiplier))
      };
    }

    function processAutoIncome() {
      const income = getAutoIncomePerSecond();

      if (income <= 0) {
        return;
      }

      state.money += income;
      saveGame();
      render();
    }

    function startAutoIncomeLoop() {
      if (autoIncomeTimerId) {
        window.clearInterval(autoIncomeTimerId);
      }

      autoIncomeTimerId = window.setInterval(processAutoIncome, CONFIG.timing.autoIncomeIntervalMs);
    }

    // 演出
    function triggerHarvestEffect(amount) {
      triggerButtonPressEffect(elements.harvestButton);
      const gainEl = document.createElement("span");
      gainEl.className = "float-gain";
      gainEl.textContent = `+${formatNumber(amount)}ナス円`;
      gainEl.style.animationDuration = `${CONFIG.timing.harvestFloatMs}ms`;
      elements.floatLayer.appendChild(gainEl);
      gainEl.addEventListener("animationend", () => gainEl.remove(), { once: true });
    }

    function triggerButtonPressEffect(button) {
      button.classList.remove("is-pressed");
      void button.offsetWidth;
      button.classList.add("is-pressed");
      window.setTimeout(() => button.classList.remove("is-pressed"), CONFIG.timing.harvestPressMs);
    }

    function triggerUpgradeEffect() {
      elements.field.classList.remove("is-upgraded");
      void elements.field.offsetWidth;
      elements.field.classList.add("is-upgraded");
      window.setTimeout(() => elements.field.classList.remove("is-upgraded"), CONFIG.timing.upgradeGlowMs);
    }

    // イベント処理
    function switchTab(tabName) {
      elements.tabButtons.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.tab === tabName);
      });

      elements.tabPanels.forEach((panel) => {
        panel.hidden = panel.dataset.panel !== tabName;
      });
    }

    function setupEventListeners() {
      elements.harvestButton.addEventListener("click", harvestNasu);
      elements.endDayButton.addEventListener("click", handleEndDay);
      elements.upgradeButton.addEventListener("click", upgradeField);
      elements.resetButton.addEventListener("click", resetGame);
      elements.tabButtons.forEach((button) => {
        button.addEventListener("click", () => switchTab(button.dataset.tab));
      });
    }

    setupEventListeners();
    startAutoIncomeLoop();
    render();
  </script>
</body>
</html>
