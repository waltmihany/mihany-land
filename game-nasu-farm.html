<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ツーブロック茄子農園 v3｜ウォルト・ミハニー・ランド</title>
  <style>
    :root {
      --ink: #2b2118;
      --paper: rgba(255, 255, 255, 0.82);
      --line: rgba(43, 33, 24, 0.14);
      --yellow: #ffcc4d;
      --green: #c9f7c1;
      --blue: #bdefff;
      --pink: #ffb7c8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at 18% 10%, rgba(255,255,255,0.92), transparent 28%),
        radial-gradient(circle at 84% 22%, rgba(201,247,193,0.72), transparent 26%),
        linear-gradient(135deg, #fff3c4, #ffd6e0, #d7f4ff);
      color: var(--ink);
      min-height: 100vh;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 18px 56px;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      background: var(--ink);
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
    }

    .hero {
      background: var(--paper);
      border: 3px solid var(--line);
      border-radius: 34px;
      padding: 34px 22px;
      text-align: center;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.09);
    }

    h1 {
      font-size: clamp(34px, 7vw, 64px);
      margin: 0 0 12px;
      letter-spacing: 0.04em;
    }

    .copy {
      font-size: clamp(17px, 3vw, 23px);
      line-height: 1.6;
      font-weight: 800;
      margin: 0;
    }

    .farm {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(260px, 0.9fr);
      gap: 18px;
      margin-top: 34px;
    }

    .panel {
      background: var(--paper);
      border: 3px solid var(--line);
      border-radius: 28px;
      padding: 24px;
      line-height: 1.8;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
    }

    .panel h2 {
      margin: 0;
      font-size: 26px;
    }

    .wallet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .version-pill {
      flex: 0 0 auto;
      background: var(--green);
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 900;
    }

    .money-box {
      margin-top: 14px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .money {
      font-size: clamp(38px, 8vw, 68px);
      line-height: 1;
      font-weight: 900;
    }

    .unit {
      font-size: 20px;
      font-weight: 900;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .stat {
      background: rgba(255,255,255,0.72);
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 14px;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.3;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .action-secondary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .button {
      border: 0;
      background: var(--ink);
      color: white;
      padding: 14px 16px;
      border-radius: 14px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      opacity: 0.9;
      text-align: center;
      min-height: 52px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .button:hover {
      opacity: 1;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .button.secondary {
      background: var(--yellow);
      color: var(--ink);
    }

    .button.primary {
      min-height: 72px;
      font-size: 22px;
      border-radius: 20px;
      box-shadow: 0 14px 24px rgba(43, 33, 24, 0.14);
    }

    .button.danger {
      background: rgba(255, 183, 200, 0.92);
      color: var(--ink);
    }

    .field {
      min-height: 260px;
      display: grid;
      place-items: center;
      text-align: center;
      background:
        linear-gradient(rgba(255,255,255,0.48), rgba(255,255,255,0.48)),
        repeating-linear-gradient(90deg, rgba(201,247,193,0.8) 0 34px, rgba(189,239,255,0.5) 34px 68px);
      border: 3px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .field-scene {
      width: min(100%, 340px);
      padding: 20px;
    }

    .field-stage {
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .field-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }

    .crop {
      display: inline-grid;
      place-items: center;
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.64);
      border: 2px solid var(--line);
      border-radius: 16px;
      font-size: 26px;
      box-shadow: 0 8px 16px rgba(43, 33, 24, 0.08);
    }

    .sign {
      display: inline-block;
      background: var(--yellow);
      border: 2px solid rgba(43, 33, 24, 0.2);
      border-radius: 14px;
      padding: 8px 12px;
      font-weight: 900;
      box-shadow: 0 8px 16px rgba(43, 33, 24, 0.1);
    }

    .visitors {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .visitor {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.74);
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 900;
      box-shadow: 0 8px 16px rgba(43, 33, 24, 0.08);
    }

    .nasu {
      font-size: 86px;
      filter: drop-shadow(0 12px 18px rgba(43, 33, 24, 0.18));
    }

    .field-note {
      margin: 8px 0 0;
      font-weight: 900;
    }

    .field-status {
      margin: 8px 0 0;
      line-height: 1.7;
      font-weight: 800;
    }

    .message {
      min-height: 28px;
      margin: 14px 0 0;
      font-weight: 800;
    }

    .footer {
      text-align: center;
      margin-top: 42px;
      opacity: 0.72;
      font-weight: 800;
    }

    @media (max-width: 760px) {
      .container {
        padding: 20px 12px 34px;
      }

      .back {
        margin-bottom: 12px;
        padding: 9px 12px;
        font-size: 14px;
      }

      .hero {
        padding: 24px 16px;
        border-radius: 26px;
      }

      .farm {
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 16px;
      }

      .panel {
        padding: 16px;
        border-radius: 24px;
      }

      .panel h2 {
        font-size: 21px;
      }

      .money-box {
        margin-top: 10px;
      }

      .money {
        font-size: clamp(42px, 14vw, 56px);
      }

      .unit {
        font-size: 17px;
      }

      .stats {
        gap: 8px;
        margin-top: 14px;
      }

      .stat {
        border-radius: 16px;
        padding: 10px;
        line-height: 1.45;
      }

      .stat strong {
        font-size: 18px;
      }

      .actions {
        gap: 10px;
        margin-top: 14px;
      }

      .button {
        min-height: 50px;
        padding: 12px 10px;
        border-radius: 14px;
      }

      .button.primary {
        min-height: 76px;
        font-size: 21px;
      }

      .field {
        min-height: 220px;
        border-radius: 24px;
      }

      .field-scene {
        padding: 14px;
      }

      .nasu {
        font-size: 64px;
      }

      .field-stage {
        gap: 8px;
      }

      .crop {
        width: 36px;
        height: 36px;
        border-radius: 13px;
        font-size: 22px;
      }

      .field-note,
      .field-status,
      .message {
        font-size: 14px;
      }

      .message {
        margin-top: 10px;
        min-height: 22px;
      }

      .footer {
        margin-top: 26px;
      }
    }

    @media (max-width: 380px) {
      h1 {
        font-size: 31px;
      }

      .copy {
        font-size: 15px;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <a class="back" href="./arcade.html">← Nasu Arcadeへ戻る</a>

    <section class="hero">
      <h1>ツーブロック茄子農園 v3</h1>
      <p class="copy">
        ナスを収穫して、畑を強化する。<br />
        小さな農園の最初の一歩。
      </p>
    </section>

    <section class="farm">
      <div class="panel">
        <div class="wallet-head">
          <h2>農園の財布</h2>
          <span class="version-pill">v3</span>
        </div>

        <div class="money-box">
          <span class="money" id="money">0</span>
          <span class="unit">ナス円</span>
        </div>

        <div class="stats">
          <div class="stat">
            収穫額
            <strong><span id="harvestAmount">10</span> ナス円</strong>
          </div>
          <div class="stat">
            自動収益
            <strong><span id="autoIncome">0</span> ナス円/秒</strong>
          </div>
          <div class="stat">
            強化費用
            <strong><span id="upgradeCost">100</span> ナス円</strong>
          </div>
          <div class="stat">
            畑レベル
            <strong>Lv.<span id="level">1</span></strong>
          </div>
        </div>

        <div class="actions">
          <button class="button primary" id="harvestButton" type="button">ナスを収穫する</button>
          <div class="action-secondary">
            <button class="button secondary" id="upgradeButton" type="button">畑をアップグレード</button>
            <button class="button danger" id="resetButton" type="button">リセット</button>
          </div>
        </div>

        <p class="message" id="message">農園、開園ナス。</p>
      </div>

      <div class="field" aria-label="ツーブロック茄子農園">
        <div class="field-scene">
          <div class="nasu">🍆</div>
          <div class="field-stage" id="fieldStage"></div>
          <p class="field-note" id="fieldName">小さな畑</p>
          <p class="field-status" id="fieldStatus">畑はまだ小さい。ここから育てるナス。</p>
        </div>
      </div>
    </section>

    <p class="footer">ツーブロック茄子農園 / v3</p>
  </main>

  <script>
    const CONFIG = {
      storageKey: "mihanyNasuFarmV01",
      initialMoney: 0,
      initialHarvestAmount: 10,
      initialUpgradeCost: 100,
      initialLevel: 1,
      harvestIncreasePerUpgrade: 5,
      upgradeCostMultiplier: 1.5,
      autoIncomePerSecond: 0
    };

    const initialState = {
      money: CONFIG.initialMoney,
      harvestAmount: CONFIG.initialHarvestAmount,
      upgradeCost: CONFIG.initialUpgradeCost,
      level: CONFIG.initialLevel
    };

    const elements = {
      money: document.getElementById("money"),
      harvestAmount: document.getElementById("harvestAmount"),
      autoIncome: document.getElementById("autoIncome"),
      upgradeCost: document.getElementById("upgradeCost"),
      level: document.getElementById("level"),
      message: document.getElementById("message"),
      fieldStage: document.getElementById("fieldStage"),
      fieldName: document.getElementById("fieldName"),
      fieldStatus: document.getElementById("fieldStatus"),
      harvestButton: document.getElementById("harvestButton"),
      upgradeButton: document.getElementById("upgradeButton"),
      resetButton: document.getElementById("resetButton")
    };

    let state = loadGame();

    function loadGame() {
      const saved = localStorage.getItem(CONFIG.storageKey);

      if (!saved) {
        return { ...initialState };
      }

      try {
        return { ...initialState, ...JSON.parse(saved) };
      } catch {
        return { ...initialState };
      }
    }

    function saveGame() {
      localStorage.setItem(CONFIG.storageKey, JSON.stringify(state));
    }

    function formatNumber(value) {
      return Math.floor(value).toLocaleString("ja-JP");
    }

    // 畑レベルに応じた右側の農園表示。
    function getFieldView(level) {
      if (level >= 10) {
        return {
          name: "いきりトマト視察農園",
          status: "いきりトマトが視察に来た。農園、ちょっと注目されているナス。",
          rows: ["🍆🍆🍆🍆", "🥕🍆🍆🍅"],
          sign: "視察対応中",
          visitors: ["ロン毛大根", "いきりトマト"]
        };
      }

      if (level >= 5) {
        return {
          name: "ロン毛大根お手伝い畑",
          status: "ロン毛大根が手伝いに来た。収穫現場に謎の安心感があるナス。",
          rows: ["🍆🍆🍆", "🥕🍆🍆"],
          sign: "ツーブロック茄子農園",
          visitors: ["ロン毛大根"]
        };
      }

      if (level >= 3) {
        return {
          name: "看板つきの畑",
          status: "看板が立った。ここが農園だと胸を張れるナス。",
          rows: ["🍆🍆🍆", "🍆🍆"],
          sign: "ツーブロック茄子農園",
          visitors: []
        };
      }

      return {
        name: "小さな畑",
        status: "畑はまだ小さい。ここから育てるナス。",
        rows: ["🍆🍆", "🍆"],
        sign: "",
        visitors: []
      };
    }

    function renderField() {
      const view = getFieldView(state.level);
      const rows = view.rows.map((row) => {
        const crops = [...row].map((crop) => `<span class="crop">${crop}</span>`).join("");
        return `<div class="field-row">${crops}</div>`;
      });
      const sign = view.sign ? [`<div class="sign">${view.sign}</div>`] : [];
      const visitors = view.visitors.length
        ? [`<div class="visitors">${view.visitors.map((visitor) => `<span class="visitor">${visitor}</span>`).join("")}</div>`]
        : [];

      elements.fieldStage.innerHTML = [...sign, ...rows, ...visitors].join("");
      elements.fieldName.textContent = view.name;
      elements.fieldStatus.textContent = view.status;
    }

    // 画面に出る数値と農園表示はここに集約。
    function render() {
      elements.money.textContent = formatNumber(state.money);
      elements.harvestAmount.textContent = formatNumber(state.harvestAmount);
      elements.autoIncome.textContent = formatNumber(CONFIG.autoIncomePerSecond);
      elements.upgradeCost.textContent = formatNumber(state.upgradeCost);
      elements.level.textContent = formatNumber(state.level);
      elements.upgradeButton.disabled = state.money < state.upgradeCost;
      renderField();
    }

    function harvestNasu() {
      state.money += state.harvestAmount;
      elements.message.textContent = `${formatNumber(state.harvestAmount)}ナス円を収穫したナス。`;
      saveGame();
      render();
    }

    function upgradeField() {
      if (state.money < state.upgradeCost) {
        elements.message.textContent = "まだナス円が足りないナス。";
        return;
      }

      state.money -= state.upgradeCost;
      state.harvestAmount += CONFIG.harvestIncreasePerUpgrade;
      state.upgradeCost = Math.ceil(state.upgradeCost * CONFIG.upgradeCostMultiplier);
      state.level += 1;
      elements.message.textContent = "畑をアップグレードしたナス。";
      saveGame();
      render();
    }

    function resetGame() {
      state = { ...initialState };
      saveGame();
      elements.message.textContent = "農園をリセットしたナス。";
      render();
    }

    elements.harvestButton.addEventListener("click", harvestNasu);
    elements.upgradeButton.addEventListener("click", upgradeField);
    elements.resetButton.addEventListener("click", resetGame);

    render();
  </script>
</body>
</html>
