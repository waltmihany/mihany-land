<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ウォルト・ミハニー・ランド</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #fff3c4, #ffd6e0, #d7f4ff);
      color: #2b2118;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .hero {
      text-align: center;
      padding: 56px 20px;
      background: rgba(255, 255, 255, 0.55);
      border: 3px solid rgba(43, 33, 24, 0.15);
      border-radius: 32px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: clamp(36px, 8vw, 72px);
      margin: 0 0 16px;
      letter-spacing: 0.04em;
    }

    .copy {
      font-size: clamp(18px, 3vw, 26px);
      line-height: 1.7;
      margin: 0;
    }

    .nasu {
      margin-top: 28px;
      font-size: 18px;
      background: #2b2118;
      color: white;
      display: inline-block;
      padding: 14px 20px;
      border-radius: 999px;
    }

    .section-title {
      margin: 48px 0 20px;
      font-size: 28px;
      text-align: center;
    }

    .areas {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
      background: rgba(255, 255, 255, 0.7);
      border: 2px solid rgba(43, 33, 24, 0.12);
      border-radius: 24px;
      padding: 22px;
      min-height: 150px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.07);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .card p {
      margin: 0;
      line-height: 1.7;
    }

    .footer {
      text-align: center;
      margin-top: 48px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>ウォルト・ミハニー・ランド</h1>
      <p class="copy">
        AIと日常とナスでできた、<br />
        小さな未完成テーマパーク。
      </p>
      <div class="nasu">ようこそナス。まだ建設中ナス。</div>
    </section>

    <h2 class="section-title">園内マップ</h2>

    <section class="areas">
      <article class="card">
        <h2>ツーブロック茄子の広場</h2>
        <p>ランドの案内人、ツーブロック茄子がいる入口。</p>
      </article>

      <article class="card">
        <h2>Nasu Arcade</h2>
        <p>ミニゲームと放置ゲームの横丁。現在建設中。</p>
      </article>

      <article class="card">
        <h2>Fairy Tale Theater</h2>
        <p>童話・昔話の再解釈シアター。</p>
      </article>

      <article class="card">
        <h2>Horror Ryokan</h2>
        <p>旅館deホラー、どんぐりの穴、タイパdeホラー。</p>
      </article>

      <article class="card">
        <h2>Mihany Lab</h2>
        <p>AI制作、Roblox実験、ゲーム開発の研究所。</p>
      </article>
    </section>

    <p class="footer">Walt Mihany Land / 仮オープン</p>
  </main>
</body>
</html>
